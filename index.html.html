/* ============ AUDIO (disabled — site is silent) ============ */
function ensureAudio(){}

/* ============ AMBIENT ROMANTIC BACKGROUND ============ */
const matrixCanvas = document.getElementById('matrix');
const mctx = matrixCanvas.getContext('2d');
let bokehParticles = [];
const bokehColors = ['#ff4fb8','#ff9a56','#b46eff','#ffffff','#ff77c8'];
function makeBokeh(w,h){
  return {
    x: Math.random()*w,
    y: h + Math.random()*h*0.5,
    r: 6 + Math.random()*22,
    c: bokehColors[Math.floor(Math.random()*bokehColors.length)],
    vy: 0.25 + Math.random()*0.6,
    phase: Math.random()*Math.PI*2,
    amp: 10 + Math.random()*30,
    baseOpacity: 0.12 + Math.random()*0.22
  };
}
function sizeMatrix(){
  matrixCanvas.width = window.innerWidth;
  matrixCanvas.height = window.innerHeight;
  const count = Math.max(24, Math.floor((matrixCanvas.width*matrixCanvas.height)/45000));
  bokehParticles = new Array(count).fill(0).map(()=>{
    const p = makeBokeh(matrixCanvas.width, matrixCanvas.height);
    p.y = Math.random()*matrixCanvas.height;
    return p;
  });
}
sizeMatrix();
window.addEventListener('resize', sizeMatrix);

function drawMatrix(){
  mctx.clearRect(0,0,matrixCanvas.width, matrixCanvas.height);
  const t = performance.now()/1000;
  bokehParticles.forEach(p=>{
    p.y -= p.vy;
    if(p.y < -p.r*2){
      Object.assign(p, makeBokeh(matrixCanvas.width, matrixCanvas.height));
      p.y = matrixCanvas.height + p.r;
    }
    const x = p.x + Math.sin(t*0.4 + p.phase)*p.amp*0.15;
    const twinkle = 0.7 + 0.3*Math.sin(t*1.3 + p.phase);
    const grad = mctx.createRadialGradient(x, p.y, 0, x, p.y, p.r);
    const opacity = p.baseOpacity * twinkle;
    grad.addColorStop(0, hexToRgba(p.c, opacity));
    grad.addColorStop(1, hexToRgba(p.c, 0));
    mctx.fillStyle = grad;
    mctx.beginPath();
    mctx.arc(x, p.y, p.r, 0, Math.PI*2);
    mctx.fill();
  });
  requestAnimationFrame(drawMatrix);
}
function hexToRgba(hex, a){
  const v = hex.replace('#','');
  const r = parseInt(v.substring(0,2),16);
  const g = parseInt(v.substring(2,4),16);
  const b = parseInt(v.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
drawMatrix();

/* ============ TERMINAL ENGINE ============ */
const output = document.getElementById('output');
const buttonsEl = document.getElementById('buttons');
const fieldArea = document.getElementById('fieldArea');
const filelistEl = document.getElementById('filelist');
let screenGen = 0;
let cursorEl = null;

function delay(ms){ return new Promise(res=> setTimeout(res, ms)); }

function highlightPriya(text){
  return text.replace(/priya jii/gi, (m)=> `<span class="priya-glow">${m}</span>`);
}

function clearOutput(){
  screenGen++;
  output.innerHTML = '';
  buttonsEl.innerHTML = '';
  fieldArea.innerHTML = '';
  filelistEl.style.display = 'none';
  filelistEl.innerHTML = '';
  removeCursor();
  return screenGen;
}
function removeCursor(){
  if(cursorEl && cursorEl.parentNode) cursorEl.parentNode.removeChild(cursorEl);
  cursorEl = null;
}
function scrollDown(){
  window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' });
}

async function typeLine(text, gen, speed=65){
  if(gen !== screenGen) return;
  const div = document.createElement('div');
  div.className = 'line';
  output.appendChild(div);
  let built = '';
  for(let i=0;i<text.length;i++){
    if(gen !== screenGen) return;
    built += text[i];
    div.innerHTML = highlightPriya(built);
    await delay(speed + Math.random()*30);
  }
  scrollDown();
}

async function typeBlock(lines, gen, speed){
  for(const line of lines){
    if(gen !== screenGen) return;
    if(line === ''){
      const sp = document.createElement('div');
      sp.className = 'spacer';
      output.appendChild(sp);
      await delay(220);
    } else {
      await typeLine(line, gen, speed);
      await delay(160);
    }
  }
}

function showButtons(list, gen){
  if(gen !== screenGen) return;
  buttonsEl.innerHTML = '';
  list.forEach(b=>{
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.textContent = b.label;
    btn.addEventListener('click', ()=>{ ensureAudio(); b.onClick(); });
    buttonsEl.appendChild(btn);
  });
}

async function screen4(){

async function checkPassword(value, gen){

    fieldArea.innerHTML = '';

    await verifyingSequence(gen);
    return;

  wrongAttempts++;
  if(wrongAttempts === 1){
    await typeBlock([
      '',
      'Access Denied.',
      '',
      'Hint:',
      '',
      'Someone calls you',
      'something sweeter',

    ], gen);
  }

async function typeModalBlock(container, lines, localGen, speed=65){

      if(!ok) return false;

  }
  return true;
}

function runConfetti(durationMs){
  const canvas = document.getElementById('confetti');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#ff4fb8','#ff9a56','#b46eff','#ffffff','#ffd23f'];
  const particles = Array.from({length:160}).map(()=>({
    x: Math.random()*canvas.width,
    y: Math.random()*-canvas.height,
    r: 3+Math.random()*5,
    c: colors[Math.floor(Math.random()*colors.length)],
    vy: 2+Math.random()*3,
    vx: -1.5+Math.random()*3,
    rot: Math.random()*360,
    vr: -6+Math.random()*12
  }));
  let start = performance.now();
  function frame(now){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if(p.y > canvas.height) p.y = -10;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.8);
      ctx.restore();
    });
    if(now - start < durationMs){
      requestAnimationFrame(frame);
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }
  }
  requestAnimationFrame(frame);
}
